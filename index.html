<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyberage Technology</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            cyber: {
              ink: "#07090f",
              panel: "#101622",
              line: "#263244",
              blue: "#0ea5e9",
              red: "#ef4444",
              gold: "#f5b84b"
            }
          },
          boxShadow: {
            cyber: "0 24px 80px rgba(14, 165, 233, 0.18)",
            hard: "0 18px 45px rgba(7, 9, 15, 0.18)"
          }
        }
      }
    };
  </script>
  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .digital-font {
      font-family: "Share Tech Mono", "Consolas", "Courier New", monospace;
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
    }

    .grid-surface {
      background-image:
        linear-gradient(rgba(14, 165, 233, 0.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(14, 165, 233, 0.12) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(to bottom, black, transparent 82%);
    }

    .noise {
      background-image:
        radial-gradient(circle at 24% 18%, rgba(14, 165, 233, 0.18), transparent 28%),
        radial-gradient(circle at 80% 12%, rgba(239, 68, 68, 0.14), transparent 26%),
        radial-gradient(circle at 68% 82%, rgba(245, 184, 75, 0.12), transparent 24%);
    }

    .geometry-field {
      position: absolute;
      inset: 0;
      z-index: -15;
      overflow: hidden;
      opacity: 0.8;
      pointer-events: none;
    }

    .geometry-field span {
      position: absolute;
      display: block;
      border: 1px solid rgba(14, 165, 233, 0.28);
      background:
        linear-gradient(135deg, rgba(14, 165, 233, 0.12), transparent 52%),
        linear-gradient(315deg, rgba(245, 184, 75, 0.1), transparent 48%);
      clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
      animation: geometry-drift 18s linear infinite;
    }

    .geometry-field span:nth-child(1) {
      left: 6%;
      top: 14%;
      width: 86px;
      height: 86px;
      animation-duration: 20s;
    }

    .geometry-field span:nth-child(2) {
      left: 28%;
      top: 68%;
      width: 120px;
      height: 120px;
      border-color: rgba(239, 68, 68, 0.22);
      animation-delay: -7s;
      animation-duration: 24s;
    }
